name: Nightly E2E Chat-Plan-Act (Windows)

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC nightly
  workflow_dispatch: {}

jobs:
  e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Run E2E scenario (Chat-Plan-Act)
        shell: pwsh
        run: |
          python scripts/e2e/nightly_chat_plan_act.py

      - name: Job summary (Windows)
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          echo "# Nightly E2E (Windows) Result" >> "$GITHUB_STEP_SUMMARY"
          if [ -f artifacts/e2e/e2e-result.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat artifacts/e2e/e2e-result.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "(no result file found)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-artifacts
          path: |
            artifacts/e2e/**
          if-no-files-found: warn

  e2e-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Run E2E scenario (Chat-Plan-Act)
        run: |
          python scripts/e2e/nightly_chat_plan_act.py

      - name: Job summary (Ubuntu)
        if: always()
        continue-on-error: true
        run: |
          echo "# Nightly E2E (Ubuntu) Result" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/e2e/e2e-result.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat artifacts/e2e/e2e-result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "(no result file found)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-artifacts-ubuntu
          path: |
            artifacts/e2e/**
          if-no-files-found: warn
