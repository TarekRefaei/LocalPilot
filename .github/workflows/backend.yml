name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: backend on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install -r requirements.txt
          if (Test-Path requirements-dev.txt) { python -m pip install -r requirements-dev.txt } || true
        shell: pwsh

      - name: Lint (ruff)
        working-directory: backend
        run: |
          python -m pip install ruff
          ruff check .

      - name: Type check (mypy)
        working-directory: backend
        run: |
          python -m pip install mypy
          mypy app --ignore-missing-imports
        shell: pwsh

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest -q --maxfail=1 --disable-warnings --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=85

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.os }}
          path: |
            backend/coverage.xml
            backend/htmlcov
