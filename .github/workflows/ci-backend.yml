name: CI Backend

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Lint (Black)
        working-directory: backend
        run: black --check .
      - name: Lint (Ruff)
        working-directory: backend
        run: ruff check .
      - name: Tests
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml --cov-report=html:htmlcov --cov-fail-under=60
      - name: Enforce Act folder coverage >= 85%
        working-directory: backend
        run: python scripts/verify_act_coverage.py
      - name: Upload coverage (Pytest XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml-${{ matrix.os }}
          path: backend/coverage.xml
      - name: Upload coverage (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html-${{ matrix.os }}
          path: backend/htmlcov/
