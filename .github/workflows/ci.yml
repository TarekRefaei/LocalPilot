name: CI
on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master", "dev" ]
jobs:
  node-tests:
    name: Node / Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ./extension
        run: |
          npm ci
      - name: Build TypeScript
        working-directory: ./extension
        run: |
          npm run compile --if-present
      - name: Generate TS JSON schemas (example)
        working-directory: ./extension
        run: |
          node ../../scripts/generate_ts_jsonschema.js ./src/contracts/envelope.ts WebSocketEnvelope ../../schemas_ts/WebSocketEnvelope.json || true
      - name: Run Jest tests
        working-directory: ./extension
        run: |
          npm test --if-present
      - name: Lint (typescript)
        working-directory: ./extension
        run: |
          npm run lint --if-present
  python-tests:
    name: Python / Backend
    runs-on: ubuntu-latest
    needs: node-tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          source .venv/bin/activate
          pytest -q backend/tests || (pytest -q backend/tests; exit 1)
      - name: Run contract parity check
        run: |
          source .venv/bin/activate
          python scripts/compare_schemas.py

  # Note: extension integration tests (Electron) run via manual workflow to avoid slowing CI.
