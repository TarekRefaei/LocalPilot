name: PR On-Demand E2E (Chat-Plan-Act)

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch: {}

jobs:
  e2e-windows:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'e2e:run')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Run E2E harness
        shell: pwsh
        run: |
          python scripts/e2e/nightly_chat_plan_act.py

      - name: Job summary (Windows)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path artifacts/e2e/e2e-result.json) {
            $res = Get-Content artifacts/e2e/e2e-result.json -Raw
            "# PR E2E (Windows) Result`n`n```json`n$res`n```" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            try {
              $obj = $res | ConvertFrom-Json
              if ($obj.timings_ms) {
                "`n## Timings (ms)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
                foreach ($k in $obj.timings_ms.PSObject.Properties.Name) {
                  $v = [math]::Round([double]$obj.timings_ms[$k],1)
                  "- $k: $v" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
                }
              }
            } catch {}
          } else {
            "# PR E2E (Windows) Result`n`n(no result file found)" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-e2e-artifacts-windows
          path: |
            artifacts/e2e/**

  e2e-ubuntu:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'e2e:run')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Run E2E harness
        run: |
          python scripts/e2e/nightly_chat_plan_act.py

      - name: Job summary (Ubuntu)
        if: always()
        run: |
          echo "# PR E2E (Ubuntu) Result" >> $GITHUB_STEP_SUMMARY
          if [ -f artifacts/e2e/e2e-result.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat artifacts/e2e/e2e-result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Timings (ms)" >> $GITHUB_STEP_SUMMARY
            python -c "import json; d=json.load(open('artifacts/e2e/e2e-result.json','r',encoding='utf-8')); t=d.get('timings_ms') or {};\n\n\n\n[print(f'- {k}: {float(t[k]):.1f}') if isinstance(t[k], (int,float)) or str(t[k]).replace('.','',1).isdigit() else print(f'- {k}: {t[k]}') for k in t]" >> $GITHUB_STEP_SUMMARY
          else
            echo "(no result file found)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-e2e-artifacts-ubuntu
          path: |
            artifacts/e2e/**
