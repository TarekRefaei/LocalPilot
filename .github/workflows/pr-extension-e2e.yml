name: PR On-Demand Extension Integration (with Backend)

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch: {}

jobs:
  windows:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'e2e:run-ext')
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      E2E_FORCE_BACKEND: '1'
      VSCODE_TEST_VERSION: '1.106.2'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Start backend (background)
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "python" -ArgumentList "-m uvicorn app.main:app --host 127.0.0.1 --port 8765" -WorkingDirectory "backend" -PassThru -WindowStyle Hidden
          Set-Content -Path backend.pid -Value $p.Id

      - name: Wait for backend health
        shell: pwsh
        run: |
          $deadline = (Get-Date).AddSeconds(30)
          $ok = $false
          while((Get-Date) -lt $deadline){
            try {
              $r = Invoke-WebRequest -UseBasicParsing -Uri "http://127.0.0.1:8765/health" -TimeoutSec 5
              if($r.StatusCode -eq 200){ $ok = $true; break }
            } catch {}
            Start-Sleep -Milliseconds 300
          }
          if(-not $ok){ throw "Backend did not become healthy in time" }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        working-directory: extension
        run: npm ci --no-audit --no-fund

      - name: Compile
        working-directory: extension
        run: npm run compile

      - name: Run Extension Integration (with backend)
        working-directory: extension
        env:
          E2E_FORCE_BACKEND: '1'
        run: npm run test:integration

      - name: Stop backend
        if: always()
        shell: pwsh
        run: |
          if (Test-Path backend.pid) {
            $backendPid = Get-Content backend.pid
            try { Stop-Process -Id $backendPid -Force } catch {}
          }

  ubuntu:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'e2e:run-ext')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      E2E_FORCE_BACKEND: '1'
      VSCODE_TEST_VERSION: '1.106.2'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Start backend (background)
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8765 > backend.log 2>&1 & echo $! > backend.pid
        working-directory: backend

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8765/health >/dev/null; then exit 0; fi
            sleep 0.5
          done
          echo "Backend did not become healthy in time" >&2
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        working-directory: extension
        run: npm ci --no-audit --no-fund

      - name: Compile
        working-directory: extension
        run: npm run compile

      - name: Run Extension Integration (with backend)
        working-directory: extension
        env:
          E2E_FORCE_BACKEND: '1'
        run: |
          xvfb-run -a -s "-screen 0 1920x1080x24" npm run test:integration

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend/backend.pid ]; then
            kill -9 "$(cat backend/backend.pid)" || true
          fi

      - name: Upload extension logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-extension-e2e-logs-${{ runner.os }}
          path: |
            backend/backend.log
            extension/.vscode-test/**
