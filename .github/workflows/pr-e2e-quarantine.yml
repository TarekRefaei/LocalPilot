name: PR E2E Quarantine Toggle (wrapper)

on:
  pull_request:
    types: [labeled, unlabeled]
  workflow_dispatch:
    inputs:
      action:
        description: 'add or remove'
        required: true
        default: 'add'
        type: choice
        options:
          - add
          - remove
      scenario:
        description: 'Scenario ID'
        required: true
        default: 'chat-plan-act'
        type: string

permissions:
  contents: write

jobs:
  call-v2:
    uses: ./.github/workflows/pr-e2e-quarantine-v2.yml
    with:
      action: ${{ inputs.action || (github.event_name == 'pull_request' && (github.event.action == 'labeled' && 'add' || 'remove')) || 'add' }}
      scenario: ${{ inputs.scenario || 'chat-plan-act' }}
